name: Build NSIS Installer

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# Allow the workflow's GITHUB_TOKEN to create/update releases.
permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Ensure NSIS is available
        shell: pwsh
        run: |
          $nsis = "C:\Program Files (x86)\NSIS\makensis.exe"
          if (-not (Test-Path $nsis)) {
            Write-Host "NSIS not preinstalled; installing via choco (with retries)..."
            for ($i = 1; $i -le 3; $i++) {
              choco install nsis -y --no-progress
              if (Test-Path $nsis) { break }
              Write-Host "Attempt $i failed; retrying in 15s..."
              Start-Sleep -Seconds 15
            }
          }
          if (-not (Test-Path $nsis)) { throw "NSIS (makensis.exe) is not available" }
          & $nsis /VERSION

      - name: Build installer
        shell: pwsh
        run: |
          # Pass an ABSOLUTE script path so NSIS's ${__FILEDIR__} resolves
          # absolutely (a relative path makes File prepend the script dir twice).
          & "C:\Program Files (x86)\NSIS\makensis.exe" /V4 "$env:GITHUB_WORKSPACE\setup\installer.nsi"

      - name: Upload installer to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: epm-setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: epm-setup
          path: epm-setup.exe
